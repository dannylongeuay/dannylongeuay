name: Update Profile README
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate GitHub Stats card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: stats
          options: show_icons=true&theme=tokyonight&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: top-langs
          options: layout=compact&theme=tokyonight&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - cyberdan-blog
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: pin
          options: username=dannylongeuay&repo=cyberdan-blog&theme=tokyonight&hide_border=true
          path: profile/pin-cyberdan-blog.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - cyberdan-platform
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: pin
          options: username=dannylongeuay&repo=cyberdan-platform&theme=tokyonight&hide_border=true
          path: profile/pin-cyberdan-platform.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - cyberdan-c4
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: pin
          options: username=dannylongeuay&repo=cyberdan-c4&theme=tokyonight&hide_border=true
          path: profile/pin-cyberdan-c4.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - resume
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: pin
          options: username=dannylongeuay&repo=resume&theme=tokyonight&hide_border=true
          path: profile/pin-resume.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - adventofcode
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: pin
          options: username=dannylongeuay&repo=adventofcode&theme=tokyonight&hide_border=true
          path: profile/pin-adventofcode.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - nixos-config
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: pin
          options: username=dannylongeuay&repo=nixos-config&theme=tokyonight&hide_border=true
          path: profile/pin-nixos-config.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Generate README
        run: go run main.go

      - name: Push changes
        run: |
          git config --global user.name '${{ github.actor }}'
          git config --global user.email '${{ github.actor }}@users.noreply.github.com'
          git add README.md profile/*.svg
          git diff --cached --quiet || (git commit -m 'chore: updated readme' && git push)
